<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save to Notion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      width: 320px;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #d4002c; /* Canadian Tire red */
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #666;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #d4002c;
      background: #fff;
    }

    input[readonly] {
      color: #555;
      cursor: default;
    }

    button {
      width: 100%;
      padding: 9px;
      margin-top: 4px;
      background: #d4002c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #b5001f; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    #status.success { color: #0a7a3e; }
    #status.error   { color: #c0392b; }

    #not-on-page {
      color: #666;
      text-align: center;
      padding: 8px 0;
    }

    .settings-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      text-decoration: none;
      cursor: pointer;
    }
    .settings-link:hover { color: #d4002c; }
  </style>
</head>
<body>
  <h1>Save to Notion</h1>

  <div id="not-on-page" style="display:none">
    Navigate to a Canadian Tire product page to save it.
  </div>

  <div id="form">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Product name" />
    </div>
    <div class="field">
      <label for="url">URL</label>
      <input type="text" id="url" readonly />
    </div>
    <div class="field">
      <label for="location">Location</label>
      <input type="text" id="location" placeholder="e.g. Aisle 1" />
    </div>
    <button id="save-btn">Save to Notion</button>
    <div id="status"></div>
  </div>

  <a class="settings-link" id="settings-link">⚙ Settings (Notion API key &amp; database ID)</a>

  <script src="popup.js"></script>
</body>
</html>
